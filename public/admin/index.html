<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BATI Nova - Administration</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css?v=20260603">
  <link rel="icon" type="image/jpeg" href="../logo.jpg">
  <style>
    .admin-icon svg { width: 18px; height: 18px; display: inline-block; vertical-align: middle; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; margin-right: 8px; }
    .rtl .admin-icon svg { margin-right: 0; margin-left: 8px; }
  </style>
</head>
<body>
  <div id="adminApp">
    <!-- Login Screen -->
    <div id="adminLogin" class="admin-login">
      <div class="login-card">
        <img src="../logo.jpg" alt="BATI Nova" class="login-logo">
        <h1>BATI Nova</h1>
        <p style="color:var(--gray-400);margin-bottom:24px;font-size:14px">Administration</p>
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="tel" class="form-input" id="adminPhone" placeholder="0555000000" dir="ltr">
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-input" id="adminPassword" placeholder="••••••••">
        </div>
        <div id="adminLoginError" class="form-error" style="text-align:center;margin-bottom:12px"></div>
        <button class="btn btn-primary btn-block btn-lg" onclick="Admin.login()">Se connecter</button>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="adminDashboard" style="display:none">
      <!-- Sidebar -->
      <aside class="sidebar" id="adminSidebar">
        <div class="sidebar-header">
          <img src="../logo.jpg" alt="BATI Nova">
          <span>BATI Nova</span>
          <div style="margin-left:auto;display:flex;gap:4px">
            <button class="dark-toggle" onclick="Admin.toggleDark()" title="Dark mode"></button>
            <button class="lang-toggle" onclick="Admin.toggleLang()" title="Langue"></button>
          </div>
        </div>
        <nav class="sidebar-nav" id="adminNav">
          <a class="nav-item active" data-page="dashboard" onclick="Admin.navigate('dashboard')"><span class="admin-icon"><svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></span> Dashboard</a>
          <a class="nav-item" data-page="products" onclick="Admin.navigate('products')"><span class="admin-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span> Produits</a>
          <a class="nav-item" data-page="orders" onclick="Admin.navigate('orders')"><span class="admin-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg></span> Commandes</a>
          <a class="nav-item" data-page="rent" onclick="Admin.navigate('rent')"><span class="admin-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span> Locations</a>
          <a class="nav-item" data-page="clients" onclick="Admin.navigate('clients')"><span class="admin-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span> Clients</a>
          <a class="nav-item" data-page="stats" onclick="Admin.navigate('stats')"><span class="admin-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> Statistiques</a>
          <a class="nav-item" onclick="Admin.logout()" style="color:var(--error);margin-top:auto"><span class="admin-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Déconnexion</a>
        </nav>
      </aside>

      <!-- Mobile header -->
      <div class="mobile-header">
        <button class="menu-btn" onclick="Admin.toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span style="font-weight:700">BATI Nova Admin</span>
        <div style="display:flex;gap:4px">
          <button class="dark-toggle" onclick="Admin.toggleDark()" title="Dark mode"></button>
          <button class="lang-toggle" onclick="Admin.toggleLang()" title="Langue"></button>
        </div>
      </div>

      <!-- Main content -->
      <main class="admin-main" id="adminMain">
        <div class="admin-content" id="adminContent">
          <div style="text-align:center;padding:60px;color:var(--gray-400)">Chargement...</div>
        </div>
      </main>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const APP_WILAYAS = ['Adrar','Chlef','Laghouat','Oum El Bouaghi','Batna','Bejaia','Biskra','Bechar','Blida','Bouira','Tamanrasset','Tebessa','Tlemcen','Tiaret','Tizi Ouzou','Alger','Djelfa','Jijel','Setif','Saida','Skikda','Sidi Bel Abbes','Annaba','Guelma','Constantine','Medea','Mostaganem','M\'Sila','Mascara','Ouargla','Oran','El Bayadh','Illizi','Bordj Bou Arreridj','Boumerdes','El Tarf','Tindouf','Tissemsilt','El Oued','Khenchela','Souk Ahras','Tipaza','Mila','Ain Defla','Naama','Ain Temouchent','Ghardaia','Relizane','Timimoun','Bordj Badji Mokhtar','Ouled Djellal','Beni Abbes','In Salah','In Guezzam','Touggourt','Djanet','El M\'Ghair','El Meniaa'];
  </script>
  <script src="../js/api.js?v=20260603"></script>
  <script src="../js/admin/admin.js?v=20260603"></script>
  <script src="../js/admin/dashboard.js?v=20260603"></script>
  <script src="../js/admin/orders.js?v=20260603"></script>
  <script src="../js/admin/clients.js?v=20260603"></script>
  <script src="../js/admin/stats.js?v=20260603"></script>
  <script src="../js/admin/products.js?v=20260603"></script>
</body>
</html>
